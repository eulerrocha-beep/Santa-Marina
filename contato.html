<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&family=Press+Start+2P&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/assets/styles/contato.css">

</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="content">

            <button id="menu-btn">☰</button>

            <nav id="menu">
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="politica.html">Política</a></li>
                    <li><a href="colecoes.html">Coleções</a></li>
                </ul>
            </nav>

            <div class="logo">
                <img src="assets/img/Logo SantaMarina.png" alt="Logo Cerâmica Santa Marina" width="180" height="auto">
            </div>

        </div>
    </header>

    <div class="container">
        <h1>Entre em Contato</h1>

        <form id="formContato">
            <input type="text" id="nome" placeholder="Seu nome" required>
            <input type="email" id="email" placeholder="Seu email" required>
            <textarea id="mensagem" placeholder="Sua mensagem" required></textarea>
            <button type="submit">Enviar</button>
        </form>

        <div class="msg" id="mensagemSucesso">
            Mensagem enviada com sucesso!
        </div>
    </div>

    <footer>
        <p>© 2026 - Casa Santa Marina</p>
    </footer>
</body>

</html>
